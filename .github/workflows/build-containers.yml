name: Build and push containers

# Triggers: push to main that touches a Dockerfile, or manual dispatch
on:
  push:
    branches: [main]
    paths:
      - 'containers/isar/Dockerfile'
      - 'containers/report/Dockerfile'
  workflow_dispatch:
    inputs:
      target:
        description: 'Which container to build (isar, report, or all)'
        required: false
        default: 'all'

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository_owner }}/alternative-splicing-nextflow

jobs:
  build-isar:
    name: Build isar container
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && (inputs.target == 'isar' || inputs.target == 'all') ||
      github.event_name == 'push' && contains(github.event.commits[0].modified, 'containers/isar/Dockerfile')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}/isar
          tags: |
            type=raw,value=1.0.0
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push isar image
        uses: docker/build-push-action@v5
        with:
          context: containers/isar
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-report:
    name: Build report container
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && (inputs.target == 'report' || inputs.target == 'all') ||
      github.event_name == 'push' && contains(github.event.commits[0].modified, 'containers/report/Dockerfile')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}/report
          tags: |
            type=raw,value=1.0.0
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push report image
        uses: docker/build-push-action@v5
        with:
          context: containers/report
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
